name: Telegram smoketest

on:
  push:
    paths:
      - '.github/workflows/telegram-smoketest.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check bot token (getMe)
        id: getme
        run: |
          RESP=$(curl -s "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN || '8931211239:AAHx779bSDIBcde6Dlzn1lBcVvn-wKGJ7GQ' }}/getMe")
          echo "getMe response: $RESP"
          echo "getme_response<<EOF" >> $GITHUB_OUTPUT
          echo "$RESP" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send test message
        id: send
        run: |
          RESP=$(curl -s "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN || '8931211239:AAHx779bSDIBcde6Dlzn1lBcVvn-wKGJ7GQ' }}/sendMessage" \
            --data-urlencode "chat_id=652328822" \
            --data-urlencode "text=🧪 Тест из GitHub Actions — бот AirBond работает! Если вы видите это сообщение, токен правильный и chat_id настроен корректно." \
            -d "parse_mode=HTML")
          echo "sendMessage response: $RESP"
          echo "send_response<<EOF" >> $GITHUB_OUTPUT
          echo "$RESP" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Report result as GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            const getMe = `${{ steps.getme.outputs.getme_response }}`;
            const send  = `${{ steps.send.outputs.send_response }}`;
            const body = `## Telegram smoketest result\n\n### getMe (bot info)\n\`\`\`json\n${getMe}\n\`\`\`\n\n### sendMessage (test to chat 652328822)\n\`\`\`json\n${send}\n\`\`\`\n\nCommit: ${context.sha.substring(0,7)}\nTime: ${new Date().toISOString()}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Telegram smoketest ${new Date().toISOString().substring(0,19)}`,
              body
            });
